<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
  <meta name="theme-color" content="#E9E2E6" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#10151F" media="(prefers-color-scheme: dark)" />
  <title>Routine</title>

  <!-- PWA: installable home-screen app + offline -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="favicon-32.png" sizes="32x32" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Routine" />

  <style>
    :root { color-scheme: light dark; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    #root { height: 100%; }
    * { -webkit-tap-highlight-color: transparent; }
    /* avoid a white flash before React mounts / behind the status bar */
    body { background: #E9E2E6; }
    @media (prefers-color-scheme: dark) { body { background: #10151F; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script
    src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"
    integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z"
    crossorigin="anonymous"></script>
  <script
    src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"
    integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1"
    crossorigin="anonymous"></script>
  <script
    src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"
    integrity="sha384-x/ilTFv/u/eu6YSmkFDZl5V5Mm/pkxxcVv2cVJOrr1J0rvILhMvRBCy6yA75wYBj"
    crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback } = React;

    // ── Morning ("After waking") — verbatim from the Psychohabitual optimization
    //    note in Evernote (isometric hold sits after neck training).
    const MORNING_STEPS = [
      "Do not rush, think slowly and deliberately, and do things one at a time",
      "Do not aimlessly scroll media in bed",
      "Open blinds to let in natural light",
      "Meditate for 5m",
      "Briefly clean room",
      "Walk, joint rollout (≈5m)",
      "Do mobility training (≈20m)",
      "Do neck training",
      "Do isometric pull-up hold (left biceps — underhand grip, ≈30–45s, a few rounds)",
      "Aesthetic check",
      "Brush teeth",
      "Do skincare (rinse, sunscreen, vitamin C)",
      "Review self-organization",
      "Review priorities",
      "Review to-do list",
      "Do not wait for >30-60m to begin mentally effortful tasks",
      "Make sure snacks are available in fridge (fresh salmon, fruits, nuts, nut butter, carrots, watermelon, Greek yogurt, greens)",
    ];

    // ── Night — verbatim from the same note's "Night" routine.
    const NIGHT_STEPS = [
      "To-do review",
      "Priorities review",
      "Self-organization review",
      "Mobility training",
      "Aesthetic check",
      "Brush teeth",
      "Shower (≤ every 3 days) / rinse (≤ every 2 days)",
      "Do skincare (cleanse, moisturizer, retinol)",
      "Set up alarms if required",
    ];

    const STEPS_BY_MODE = { morning: MORNING_STEPS, night: NIGHT_STEPS };
    const MODE_META = {
      morning: { label: "Morning", theme: "light",
        doneSub: "You're ready for the day — check off your morning routine in Todoist." },
      night: { label: "Night", theme: "dark",
        doneSub: "You're set for the night — check off your night routine in Todoist." },
    };

    // ── Mobility circuit — verbatim from "Project Bend, Extend, and Mend".
    //    Timers only on the stretches; hold options are 35s / 95s.
    const MOBILITY = [
      { section: "Rollouts", timed: false, items: ["Shoulders", "Neck", "Upper torso", "Hips", "Knees", "Ankles"] },
      { section: "Dynamic movements", timed: false, items: ["Jumps", "Lunges", "High knees", "Leg swings", "90-90 rotations", "Hip CARs"] },
      { section: "Stretches", timed: true, items: ["Elephant walk", "Half kneeling stretch back and forth", "Split stretch", "Couch stretch", "Glute stretch / pigeon stretch", "Put foot on wall and then take off", "Butterfly stretch"] },
    ];
    const MOBILITY_TOTAL = MOBILITY.reduce((n, s) => n + s.items.length, 0);
    const HOLDS = [35, 95];

    const MANTRA = "Keep calm, analyze, and optimize";
    const MODE_KEY = "routine-mode";
    const progKey = (m) => `routine-progress-${m}`;

    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(
        d.getDate()
      ).padStart(2, "0")}`;
    }

    function fmt(sec) {
      return `${Math.floor(sec / 60)}:${String(sec % 60).padStart(2, "0")}`;
    }

    // linear interpolate between two hex colors → rgb() string
    function lerpHex(a, b, t) {
      const p = (h, i) => parseInt(h.replace("#", "").slice(i, i + 2), 16);
      const mix = (i) => Math.round(p(a, i) + (p(b, i) - p(a, i)) * t);
      return `rgb(${mix(0)}, ${mix(2)}, ${mix(4)})`;
    }

    // dawn (cool, pre-light) → warm daylight, per theme
    const GRADIENTS = {
      light: { COOL_TOP: "#D9E2EC", COOL_BOT: "#E9E2E6", WARM_TOP: "#F4ECDC", WARM_BOT: "#F8E4D2" },
      dark:  { COOL_TOP: "#10151F", COOL_BOT: "#141019", WARM_TOP: "#1E1710", WARM_BOT: "#23160F" },
    };

    const CSS = `
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..460&family=Inter:wght@400;500&display=swap');

    .mr-root{
      --txt:#26333F; --sub:#6B7885; --accent:#35695E; --accentH:#2C5A50;
      --btnTxt:#FBFAF7; --track:rgba(38,51,63,.13); --ghost:#8A96A1;
      --rowBorder:rgba(38,51,63,.12); --chipBg:rgba(53,105,94,.10); --chipTxt:#35695E;
      --shadow:rgba(38,51,63,.14);
      height:100dvh; width:100%;
      display:flex; justify-content:center;
      color:var(--txt);
      font-family:'Inter',system-ui,-apple-system,sans-serif;
      transition:background 1200ms ease;
      -webkit-font-smoothing:antialiased;
      overflow:hidden;
    }
    .mr-root[data-theme="dark"]{
      --txt:#E8EDF1; --sub:#9AA7B2; --accent:#55988A; --accentH:#66A99B;
      --btnTxt:#0E1519; --track:rgba(232,237,241,.15); --ghost:#7E8A94;
      --rowBorder:rgba(232,237,241,.12); --chipBg:rgba(85,152,138,.16); --chipTxt:#7FC3B4;
      --shadow:rgba(0,0,0,.35);
    }
    .mr-frame{
      position:relative;
      width:100%; max-width:33rem; height:100%;
      display:flex; flex-direction:column;
      /* base padding + iOS/Android safe-area insets (notch, home indicator) */
      padding:
        calc(2rem + env(safe-area-inset-top))
        calc(1.6rem + env(safe-area-inset-right))
        calc(1.5rem + env(safe-area-inset-bottom))
        calc(1.6rem + env(safe-area-inset-left));
      box-sizing:border-box;
    }
    .mr-theme{
      position:absolute;
      top:calc(1rem + env(safe-area-inset-top));
      right:calc(1.1rem + env(safe-area-inset-right));
      z-index:5;
      appearance:none; border:none; background:none; cursor:pointer;
      font-size:1.15rem; line-height:1; padding:.4rem; border-radius:999px;
      color:var(--sub); transition:color 160ms ease, transform 200ms ease;
    }
    .mr-theme:hover{ color:var(--txt); transform:rotate(12deg); }
    .mr-top{ min-height:3.2rem; flex:0 0 auto; }
    .mr-eyebrow{
      font-size:.78rem; letter-spacing:.13em; text-transform:uppercase;
      color:var(--sub); margin-bottom:.85rem;
    }
    .mr-track{ height:2px; width:100%; border-radius:2px; background:var(--track); overflow:hidden; }
    .mr-fill{ height:100%; background:var(--accent); border-radius:2px;
      transition:width 600ms cubic-bezier(.22,1,.36,1); }
    .mr-main{
      flex:1 1 auto; min-height:0;
      display:flex; flex-direction:column;
      justify-content:center; align-items:center; text-align:center;
      padding:1.2rem 0;
    }
    .mr-main.mob{ justify-content:flex-start; align-items:stretch; text-align:left; padding:.6rem 0 .4rem; }
    .mr-step{
      font-family:'Fraunces',Georgia,serif;
      font-weight:390; font-size:clamp(1.7rem,6.2vw,2.55rem);
      line-height:1.28; letter-spacing:-.01em; margin:0; max-width:22ch;
      animation:mr-rise 620ms cubic-bezier(.22,1,.36,1) both;
    }
    .mr-lead{
      font-family:'Fraunces',Georgia,serif;
      font-weight:400; font-size:clamp(1.9rem,7vw,2.7rem);
      line-height:1.15; margin:0 0 .7rem; letter-spacing:-.015em;
      animation:mr-rise 620ms cubic-bezier(.22,1,.36,1) both;
    }
    .mr-sub{ font-size:1.02rem; line-height:1.5; color:var(--sub); margin:0; max-width:30ch;
      animation:mr-rise 700ms cubic-bezier(.22,1,.36,1) both; }
    .mr-bottom{ flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:.85rem; min-height:1rem; }
    .mr-btn{
      appearance:none; border:none; cursor:pointer;
      background:var(--accent); color:var(--btnTxt);
      font-family:inherit; font-weight:500; font-size:1.05rem;
      padding:.95rem 3.4rem; border-radius:999px; min-width:12rem;
      box-shadow:0 6px 18px var(--shadow);
      transition:background 180ms ease, transform 120ms ease, box-shadow 180ms ease;
    }
    .mr-btn:hover{ background:var(--accentH); }
    .mr-btn:active{ transform:translateY(1px); }
    .mr-mantra{
      font-family:'Fraunces',Georgia,serif; font-weight:400;
      font-size:clamp(1.15rem,4.7vw,1.42rem); line-height:1.35;
      white-space:normal; max-width:19rem; padding:1.15rem 2.2rem; border-radius:1.7rem;
      animation:mr-rise 700ms cubic-bezier(.22,1,.36,1) both;
    }
    .mr-ghost{
      appearance:none; border:none; background:none; cursor:pointer;
      font-family:inherit; font-size:.92rem; color:var(--ghost);
      padding:.35rem .7rem; border-radius:8px; transition:color 160ms ease;
    }
    .mr-ghost:hover{ color:var(--txt); }
    .mr-btn:focus-visible, .mr-ghost:focus-visible, .mr-theme:focus-visible{
      outline:2px solid var(--accent); outline-offset:3px;
    }

    /* ── Mobility checklist ── */
    .mob-wrap{ display:flex; flex-direction:column; min-height:0; flex:1 1 auto; width:100%;
      animation:mr-rise 620ms cubic-bezier(.22,1,.36,1) both; }
    .mob-head{ font-family:'Fraunces',Georgia,serif; font-weight:400;
      font-size:clamp(1.35rem,5vw,1.8rem); letter-spacing:-.01em; margin:0; color:var(--txt); }
    .mob-controls{ display:flex; align-items:center; justify-content:space-between; gap:.6rem; margin:.35rem 0 .1rem; }
    .mob-prog{ font-size:.8rem; color:var(--sub); font-variant-numeric:tabular-nums; }
    .mob-scroll{ flex:1 1 auto; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch;
      margin-top:.2rem; padding-right:.3rem;
      -webkit-mask-image:linear-gradient(180deg,transparent,#000 .7rem,#000 calc(100% - .7rem),transparent);
              mask-image:linear-gradient(180deg,transparent,#000 .7rem,#000 calc(100% - .7rem),transparent); }
    .mob-section{ font-family:'Fraunces',Georgia,serif; font-size:.95rem; font-weight:500;
      color:var(--sub); margin:.85rem 0 .1rem; letter-spacing:.01em; }
    .mob-row{ display:flex; align-items:center; gap:.6rem; padding:.5rem 0; border-bottom:1px solid var(--rowBorder); }
    .mob-check{ flex:0 0 auto; width:1.35rem; height:1.35rem; border-radius:7px;
      border:1.5px solid var(--rowBorder); background:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center; color:var(--btnTxt);
      font-size:.85rem; transition:background 140ms ease, border-color 140ms ease; }
    .mob-check.on{ background:var(--accent); border-color:var(--accent); }
    .mob-label{ flex:1 1 auto; font-size:.98rem; color:var(--txt); text-align:left; line-height:1.3;
      background:none; border:none; padding:0; font-family:inherit; cursor:pointer; }
    .mob-label.on{ color:var(--sub); text-decoration:line-through; }
    .mob-durs{ flex:0 0 auto; display:flex; align-items:center; gap:.3rem; }
    .mob-chip{ appearance:none; border:none; cursor:pointer; font:inherit;
      font-size:.8rem; font-variant-numeric:tabular-nums; padding:.34rem .55rem; border-radius:999px;
      background:var(--chipBg); color:var(--chipTxt); min-width:3.3rem; text-align:center;
      transition:background 140ms ease, color 140ms ease; }
    .mob-chip.run{ background:var(--accent); color:var(--btnTxt); }
    .mob-reset{ appearance:none; border:none; background:none; cursor:pointer; color:var(--sub);
      font-size:1.05rem; line-height:1; padding:.2rem .3rem; border-radius:6px; transition:color 140ms ease; }
    .mob-reset:hover{ color:var(--txt); }

    @keyframes mr-rise{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }
    @media (prefers-reduced-motion: reduce){
      .mr-root,.mr-fill,.mr-btn,.mr-theme{ transition:none; }
      .mr-step,.mr-lead,.mr-sub,.mr-mantra,.mob-wrap{ animation:none; }
    }
    `;

    // Soft two-note chime + haptic when a hold completes.
    function useChime() {
      const ctxRef = React.useRef(null);
      return useCallback(() => {
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (AC) {
            if (!ctxRef.current) ctxRef.current = new AC();
            const ctx = ctxRef.current;
            if (ctx.state === "suspended") ctx.resume();
            const t = ctx.currentTime;
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.type = "sine";
            o.frequency.setValueAtTime(880, t);
            o.frequency.setValueAtTime(1174.66, t + 0.13);
            g.gain.setValueAtTime(0.0001, t);
            g.gain.exponentialRampToValueAtTime(0.22, t + 0.02);
            g.gain.exponentialRampToValueAtTime(0.0001, t + 0.55);
            o.connect(g);
            g.connect(ctx.destination);
            o.start(t);
            o.stop(t + 0.55);
          }
        } catch (e) { /* audio is best-effort */ }
        try { if (navigator.vibrate) navigator.vibrate(110); } catch (e) {}
      }, []);
    }

    function MobilityChecklist() {
      const [done, setDone] = useState(() => new Set());
      const [active, setActive] = useState(null); // { key, dur }
      const [running, setRunning] = useState(false);
      const [remaining, setRemaining] = useState(0);
      const chime = useChime();

      useEffect(() => {
        if (!running || !active) return;
        const id = setInterval(() => setRemaining((r) => Math.max(0, r - 1)), 1000);
        return () => clearInterval(id);
      }, [running, active]);

      useEffect(() => {
        if (running && active && remaining === 0) {
          const finished = active.key;
          setDone((d) => { const n = new Set(d); n.add(finished); return n; });
          setRunning(false);
          setActive(null);
          chime();
        }
      }, [remaining, running, active, chime]);

      const onDur = useCallback((key, dur) => {
        setActive((cur) => {
          if (cur && cur.key === key && cur.dur === dur) { setRunning((r) => !r); return cur; } // pause/resume
          setRemaining(dur); setRunning(true); return { key, dur };                              // fresh hold
        });
      }, []);

      const onReset = useCallback((key) => {
        setActive((cur) => {
          if (cur && cur.key === key) { setRunning(false); setRemaining(0); return null; }
          return cur;
        });
      }, []);

      const toggleDone = useCallback((key) => {
        setDone((d) => { const n = new Set(d); n.has(key) ? n.delete(key) : n.add(key); return n; });
      }, []);

      const resetAll = useCallback(() => {
        setDone(new Set()); setActive(null); setRunning(false); setRemaining(0);
      }, []);

      return (
        <div className="mob-wrap">
          <p className="mob-head">Mobility training</p>
          <div className="mob-controls">
            <span className="mob-prog">
              {done.size === MOBILITY_TOTAL ? "all done ✓" : `${done.size} / ${MOBILITY_TOTAL} done`}
            </span>
            <button className="mr-ghost" style={{ padding: ".2rem .5rem", fontSize: ".8rem" }} onClick={resetAll}>
              reset all
            </button>
          </div>

          <div className="mob-scroll">
            {MOBILITY.map((sec) => (
              <div key={sec.section}>
                <div className="mob-section">{sec.section}</div>
                {sec.items.map((item) => {
                  const key = sec.section + "::" + item;
                  const isDone = done.has(key);
                  const isActive = active && active.key === key;
                  return (
                    <div className="mob-row" key={key}>
                      <button
                        className={"mob-check" + (isDone ? " on" : "")}
                        onClick={() => toggleDone(key)}
                        aria-label={isDone ? "Mark not done" : "Mark done"}
                      >
                        {isDone ? "✓" : ""}
                      </button>
                      <button className={"mob-label" + (isDone ? " on" : "")} onClick={() => toggleDone(key)}>
                        {item}
                      </button>
                      {sec.timed && (
                        <div className="mob-durs">
                          {HOLDS.map((dur) => {
                            const onThis = isActive && active.dur === dur;
                            return (
                              <button
                                key={dur}
                                className={"mob-chip" + (onThis && running ? " run" : "")}
                                onClick={() => onDur(key, dur)}
                                aria-label={`${dur} second hold`}
                              >
                                {onThis ? `${fmt(remaining)} ${running ? "⏸" : "▶"}` : `▶ ${dur}s`}
                              </button>
                            );
                          })}
                          {isActive && (
                            <button className="mob-reset" onClick={() => onReset(key)} aria-label="Reset timer">↺</button>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      );
    }

    function Routine() {
      const [mode, setMode] = useState("morning"); // "morning" (light) | "night" (dark)
      const [pos, setPos] = useState(0);           // 0 = intro, 1..N = steps, N+1 = done
      const [loaded, setLoaded] = useState(false);

      // resolve initial mode: saved → else system dark preference
      useEffect(() => {
        try {
          const saved = localStorage.getItem(MODE_KEY);
          if (saved === "morning" || saved === "night") setMode(saved);
          else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) setMode("night");
        } catch (e) {}
      }, []);

      // load the active mode's saved progress for today whenever the mode changes
      useEffect(() => {
        const cap = STEPS_BY_MODE[mode].length + 1;
        let p = 0;
        try {
          const raw = localStorage.getItem(progKey(mode));
          if (raw) {
            const s = JSON.parse(raw);
            if (s.date === todayStr() && typeof s.pos === "number") p = Math.max(0, Math.min(cap, s.pos));
          }
        } catch (e) {}
        setPos(p);
        setLoaded(true);
      }, [mode]);

      const go = useCallback((next) => {
        const cap = STEPS_BY_MODE[mode].length + 1;
        const clamped = Math.max(0, Math.min(cap, next));
        setPos(clamped);
        try {
          localStorage.setItem(progKey(mode), JSON.stringify({ date: todayStr(), pos: clamped }));
        } catch (e) {}
      }, [mode]);

      const toggleMode = useCallback(() => {
        setMode((m) => {
          const next = m === "night" ? "morning" : "night";
          try { localStorage.setItem(MODE_KEY, next); } catch (e) {}
          return next;
        });
      }, []);

      const steps = STEPS_BY_MODE[mode];
      const N = steps.length;
      const theme = MODE_META[mode].theme;
      const mobilityIdx = steps.findIndex((s) => s.toLowerCase().includes("mobility training"));

      const g = GRADIENTS[theme];
      const frac = Math.min(1, Math.max(0, pos / (N + 1)));
      const rootStyle = {
        background: `linear-gradient(180deg, ${lerpHex(g.COOL_TOP, g.WARM_TOP, frac)} 0%, ${lerpHex(
          g.COOL_BOT, g.WARM_BOT, frac
        )} 100%)`,
      };

      if (!loaded) {
        return (
          <div className="mr-root" data-theme={theme} style={rootStyle}>
            <style>{CSS}</style>
          </div>
        );
      }

      const isIntro = pos === 0;
      const isDone = pos === N + 1;
      const isStep = !isIntro && !isDone;
      const stepIdx = pos - 1;
      const isMobility = isStep && stepIdx === mobilityIdx;

      return (
        <div className="mr-root" data-theme={theme} style={rootStyle}>
          <style>{CSS}</style>
          <div className="mr-frame">
            <button className="mr-theme" onClick={toggleMode} aria-label="Switch between morning and night routine">
              {mode === "night" ? "☀" : "☾"}
            </button>

            <header className="mr-top">
              {isStep && (
                <>
                  <div className="mr-eyebrow">{MODE_META[mode].label} · step {pos} of {N}</div>
                  <div className="mr-track">
                    <div className="mr-fill" style={{ width: `${(pos / N) * 100}%` }} />
                  </div>
                </>
              )}
            </header>

            <main className={"mr-main" + (isMobility ? " mob" : "")}>
              {isIntro && (
                <button className="mr-btn mr-mantra" onClick={() => go(1)}>{MANTRA}</button>
              )}
              {isStep && !isMobility && (
                <p className="mr-step" key={mode + pos}>{steps[stepIdx]}</p>
              )}
              {isMobility && <MobilityChecklist key={mode + pos} />}
              {isDone && (
                <div>
                  <p className="mr-lead">That's the routine.</p>
                  <p className="mr-sub">{MODE_META[mode].doneSub}</p>
                </div>
              )}
            </main>

            <footer className="mr-bottom">
              {isStep && (
                <>
                  <button className="mr-btn" onClick={() => go(pos + 1)}>Done</button>
                  <button className="mr-ghost" onClick={() => go(pos - 1)}>‹ Back</button>
                </>
              )}
              {isDone && (
                <button className="mr-ghost" onClick={() => go(0)}>Start over</button>
              )}
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Routine />);
  </script>

  <script>
