<!DOCTYPE html>

  <link rel="manifest" href="manifest.webmanifest" />

  <style>

    html { font-size: 112.5%; } /* ~18px base — bumps every rem-based size up a couple points */

<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"
    integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"
    integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"
    integrity="sha384-x/ilTFv/u/eu6YSmkFDZl5V5Mm/pkxxcVv2cVJOrr1J0rvILhMvRBCy6yA75wYBj" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback, useRef } = React;

    const INTRO_HEADLINE = "Clear your mind"; // shown on the opening page of both modes

    // "Psychohabitual adjustments to keep in mind" — copied from the Evernote note.
    const PSYCHO_STEP = "Psychohabitual adjustments to keep in mind";
    const PSYCHO = [
      { t: "Cognition and mindset: Do more cerebral and less instinctive thought.", c: [
        "Tasks one-at-a-time, without completion pressure and with focus: slow down, do things without rushing or having time pressure, and do them precisely and intentionally. Enter flow state with low adrenaline and strain if you're not. Don't be so focused on trying to complete something swiftly, instead, go through executing it deliberately, with a good sustainable pace and with thoughtfulness. Don't rush speaking and being rambly, give yourself time to articulate accurately. Be mindful when transitioning between tasks. Don't load your mind with tasks, rely on task management systems",
        "Be happy, optimistic, loving, complimentary, and positive",
        "Feel hopeful, proactive, confident, bold, take agency seriously, and feel very much like you're capable of inducing change and progress in your life. Be realistic about how long things take and have a keep calm and optimize mentality",
        "Be self-aware of biological needs and emotional state",
      ]},
      { t: "Commitments and goals: Be highly attentive to when you are accepting to do something or committing to something.", c: [
        "Explicitly write down what you're meant to do",
        "Make sure that when committing to something or accepting to doing it, the appropriate resources are available and allocated",
      ]},
      { t: "Attention control:", c: [
        { t: "Task management", c: [
          { t: "Eliminate hesitation to begin tasks that have difficult paths to completion", c: [
            "Stop all activities and thoughts in the moment and contemplate whether I should start the task, continue to wait to do the task, or do something else in the meantime",
          ]},
          "List and time all tasks as they come to mind rather than storing them in temporary conscious memory",
          "Patiently evaluate all scenarios, choosing best-case scenario and proceed",
          "Eliminate deep and hard to notice fatiguing/stressful/negative emotions induced by thinking about starting tasks",
        ]},
        "Either be attentive to conversations being had or cease them rather than contemplating during them",
        "Write comprehensively to eliminate necessity of remembering supplementary information and ensure that upon revisiting a note or topic, it's possible to fully understand it >95% of the time",
        "Be intolerant of wasted time: Structure activities such that all require deep focus and a detail-oriented mindset.",
      ]},
    ];

    const MORNING_STEPS = [
      "Open blinds to let in natural light",
      PSYCHO_STEP,
      "Meditate",
      "Briefly clean room",
      "Walk and joint rollout",
      "Do mobility training (≈20m)",
      "Do neck training",
      "Do isometric pull-up hold (left biceps — underhand grip, ≈30–45s, a few rounds)",
      "Aesthetic check",
      "Brush teeth",
      "Do skincare (rinse, sunscreen, vitamin C)",
      "Review self-organization",
      "Review priorities",
      "Review to-do list",
      "Do not wait for >30-60m to begin mentally effortful tasks",
      "Make sure snacks are available in fridge (fresh salmon, fruits, nuts, nut butter, carrots, watermelon, Greek yogurt, greens)",
    ];
    const NIGHT_STEPS = [
      "To-do review",
      "Priorities review",
      "Self-organization review",
      "Mobility training",
      "Aesthetic check",
      "Brush teeth",
      "Shower (≤ every 3 days) / rinse (≤ every 2 days)",
      "Do skincare (cleanse, moisturizer, retinol)",
      "Set up alarms if required",
    ];

    const STEPS_BY_MODE = { morning: MORNING_STEPS, night: NIGHT_STEPS };
    const INTRO_LINE = { morning: INTRO_HEADLINE, night: INTRO_HEADLINE };
    const MODE_META = { morning: { label: "Morning", theme: "light" }, night: { label: "Night", theme: "dark" } };

    // ── Mobility circuit ──
    // Rollouts + Dynamic movements live on the "Walk and joint rollout" step; Stretches on "Do mobility training".
    const ROLLOUT_CIRCUIT = [
      { section: "Rollouts", timed: false, items: ["Shoulders", "Neck", "Upper torso", "Hips", "Knees", "Ankles"] },
      { section: "Dynamic movements", timed: false, items: ["Jumps", "Lunges", "High knees", "Leg swings", "90-90 rotations", "Hip CARs"] },
    ];
    const MOBILITY = [
      { section: "Stretches", timed: true, items: [
        { name: "Elephant walk", sides: false },
        { name: "Half kneeling stretch back and forth", sides: true },
        { name: "Split stretch", sides: false },
        { name: "Couch stretch", sides: true },
        { name: "Glute stretch / pigeon stretch", sides: true },
        { name: "Put foot on wall and then take off", sides: true },
        { name: "Butterfly stretch", sides: false },
      ] },
    ];
    const itemName = (it) => (typeof it === "object" ? it.name : it);
    const itemSides = (it) => (typeof it === "object" ? !!it.sides : false);
    const sectionsTotal = (secs) => secs.reduce((n, s) => n + s.items.reduce((m, it) => m + (itemSides(it) ? 2 : 1), 0), 0);
    const HOLDS = [35, 95];

    // opening button label per mode: morning = mantra, night = a gentle "Relax"
    const MANTRA = { morning: "Keep calm, analyze, and optimize", night: "Relax" };
    const MODE_KEY = "routine-mode";
    const progKey = (m) => `routine-progress-${m}`;

    // Deep links — open the native apps.
    const EN_UID = "27366594", EN_SHARD = "s222";
    const enLink = (guid) => `evernote:///view/${EN_UID}/${EN_SHARD}/${guid}/${guid}/`;
    const DEEPLINKS = {
      selforg: enLink("5ab1aac9-1483-0510-804b-9d36b34d5b28"),
      priorities: enLink("96537671-bc0b-ab2d-fb94-c1246eff009b"),
      todoist: "todoist://today",
    };
    function stepLink(text) {
      const t = text.toLowerCase();
      if (t.includes("self-organization")) return { href: DEEPLINKS.selforg, label: "Open in Evernote ↗" };
      if (t.includes("priorities")) return { href: DEEPLINKS.priorities, label: "Open in Evernote ↗" };
      if (t.includes("to-do")) return { href: DEEPLINKS.todoist, label: "Open Todoist ↗" };
      return null;
    }

    // The routine "day" rolls over at 1 PM: progress from the morning persists until then,
    // and each new morning starts fresh. (Shifting the clock back RESET_HOUR hours makes the
    // calendar date flip at RESET_HOUR.)
    const RESET_HOUR = 13;
    function routineDay() {
      const d = new Date();
      d.setHours(d.getHours() - RESET_HOUR);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    }
    function fmt(sec) { return `${Math.floor(sec / 60)}:${String(sec % 60).padStart(2, "0")}`; }
    function lerpHex(a, b, t) {
      const p = (h, i) => parseInt(h.replace("#", "").slice(i, i + 2), 16);
      const mix = (i) => Math.round(p(a, i) + (p(b, i) - p(a, i)) * t);
      return `rgb(${mix(0)}, ${mix(2)}, ${mix(4)})`;
    }
    const GRADIENTS = {
      light: { COOL_TOP: "#D9E2EC", COOL_BOT: "#E9E2E6", WARM_TOP: "#F4ECDC", WARM_BOT: "#F8E4D2" },
      dark:  { COOL_TOP: "#10151F", COOL_BOT: "#141019", WARM_TOP: "#1E1710", WARM_BOT: "#23160F" },
    };

    const CSS = `
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..460&family=Inter:wght@400;500&display=swap');

    .mr-root{
      --txt:#26333F; --sub:#6B7885; --accent:#35695E; --accentH:#2C5A50;
      --btnTxt:#FBFAF7; --track:rgba(38,51,63,.13); --ghost:#8A96A1;
      --rowBorder:rgba(38,51,63,.12); --chipBg:rgba(53,105,94,.10); --chipTxt:#35695E; --shadow:rgba(38,51,63,.14);
      --hill1:#6E9E90; --hill2:#3F776B; --hill3:#2C5A50; /* solid, back→front, atmospheric */
      height:100dvh; width:100%; display:flex; justify-content:center; color:var(--txt);
      font-family:'Inter',system-ui,-apple-system,sans-serif; transition:background 1200ms ease;
      -webkit-font-smoothing:antialiased; overflow:hidden;
    }
    .mr-root[data-theme="dark"]{
      --txt:#E8EDF1; --sub:#9AA7B2; --accent:#55988A; --accentH:#66A99B;
      --btnTxt:#0E1519; --track:rgba(232,237,241,.15); --ghost:#7E8A94;
      --rowBorder:rgba(232,237,241,.12); --chipBg:rgba(85,152,138,.16); --chipTxt:#7FC3B4; --shadow:rgba(0,0,0,.35);
      --hill1:#2E4A44; --hill2:#24413B; --hill3:#1B322D;
    }
    .mr-frame{
      position:relative; z-index:1; width:100%; max-width:33rem; height:100%; display:flex; flex-direction:column;
      padding: calc(2rem + env(safe-area-inset-top)) calc(1.6rem + env(safe-area-inset-right))
               calc(1.5rem + env(safe-area-inset-bottom)) calc(1.6rem + env(safe-area-inset-left));
      box-sizing:border-box;
    }
    .mr-theme{
      position:absolute; top:calc(1rem + env(safe-area-inset-top)); right:calc(1.1rem + env(safe-area-inset-right)); z-index:5;
      appearance:none; border:none; background:none; cursor:pointer; font-size:1.15rem; line-height:1; padding:.4rem;
      border-radius:999px; color:var(--sub); transition:color 160ms ease, transform 200ms ease;
    }
    .mr-theme:hover{ color:var(--txt); transform:rotate(12deg); }
    .mr-top{ min-height:3.2rem; flex:0 0 auto; }
    .mr-eyebrow-row{ display:flex; align-items:baseline; justify-content:space-between; gap:1rem; margin-bottom:.85rem; }
    .mr-eyebrow{ font-size:.78rem; letter-spacing:.13em; text-transform:uppercase; color:var(--sub); }
    .mr-watch{ font-size:.85rem; font-variant-numeric:tabular-nums; color:var(--sub); letter-spacing:.02em; flex:0 0 auto; }
    .mr-track{ height:2px; width:100%; border-radius:2px; background:var(--track); overflow:hidden; }
    .mr-fill{ height:100%; background:var(--accent); border-radius:2px; transition:width 600ms cubic-bezier(.22,1,.36,1); }
    .mr-main{
      flex:1 1 auto; min-height:0; display:flex; flex-direction:column; justify-content:center; align-items:center;
      text-align:center; padding:1.2rem 0; position:relative; overflow:hidden;
    }
    /* --panel-clear is measured from the live Done button (JS) so the scroll ends exactly above it
       with a little padding — no hardcoded height. Fallback 6rem before the first measurement. */
    .mr-main.panel{ justify-content:flex-start; align-items:stretch; text-align:left; padding:.6rem 0 var(--panel-clear, 6rem); }
    .mr-step{ font-family:'Fraunces',Georgia,serif; font-weight:390; font-size:clamp(1.7rem,6.2vw,2.55rem);
      line-height:1.28; letter-spacing:-.01em; margin:0; max-width:22ch; animation:mr-rise 620ms cubic-bezier(.22,1,.36,1) both; }
    .mr-lead{ font-family:'Fraunces',Georgia,serif; font-weight:400; font-size:clamp(1.9rem,7vw,2.7rem);
      line-height:1.15; margin:0 0 .7rem; letter-spacing:-.015em; animation:mr-rise 620ms cubic-bezier(.22,1,.36,1) both; }
    .mr-sub{ font-size:1.02rem; line-height:1.5; color:var(--sub); margin:0; max-width:30ch; animation:mr-rise 700ms cubic-bezier(.22,1,.36,1) both; }

    /* opening-page line, above the morphing button — a plain fade-in (no rise). */
    .mr-intro-line{ position:absolute; left:1.5rem; right:1.5rem; bottom:57%; margin:0 auto; max-width:20ch;
      font-family:'Fraunces',Georgia,serif; font-weight:400; font-size:clamp(1.3rem,5vw,1.95rem);
      line-height:1.3; color:var(--txt); text-align:center;
      animation:mr-fadein 760ms ease 100ms both; }
    .mr-intro-line.out{ animation:mr-fadeout 300ms ease forwards; }

    .mr-bottom{ flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:.85rem; min-height:1rem; }
    .mr-btn{ appearance:none; border:none; cursor:pointer; background:var(--accent); color:var(--btnTxt);
      font-family:inherit; font-weight:500; font-size:1.05rem; padding:.95rem 3.4rem; border-radius:999px; min-width:12rem;
      box-shadow:0 6px 18px var(--shadow); transition:background 180ms ease, transform 120ms ease, box-shadow 180ms ease; }
    .mr-btn:hover{ background:var(--accentH); }
    .mr-btn:active{ transform:translateY(1px); }

    /* One element that MORPHS: a fixed box that reshapes + repositions (transform + width + height +
       border-radius) while two labels crossfade inside it. bottom is constant so WebKit interpolates
       cleanly; fixed width/height + left:50%/translateX(-50%) keep the center pinned (no snap). */
    .cta{ position:fixed; left:50%; bottom:calc(2.8rem + env(safe-area-inset-bottom)); z-index:4; appearance:none; border:none; cursor:pointer;
      box-sizing:border-box; overflow:hidden; background:var(--accent); color:var(--btnTxt); box-shadow:0 6px 18px var(--shadow);
      transition: transform 660ms cubic-bezier(.5,0,.2,1), width 660ms cubic-bezier(.5,0,.2,1), height 660ms cubic-bezier(.5,0,.2,1),
                  border-radius 660ms cubic-bezier(.5,0,.2,1), background 180ms ease; }
    .cta:hover{ background:var(--accentH); }
    .cta-intro{ transform:translate(-50%,-31dvh); width:17rem; height:6.5rem; border-radius:1.7rem; }
    .cta-intro.enter{ animation:mr-fadein 620ms ease both; }
    .cta-step{ transform:translate(-50%,0); width:11rem; height:3.35rem; border-radius:999px; }
    /* labels are absolutely centered so the box's own width/height drives the shape; they crossfade */
    .cta-lbl{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center;
      padding:0 1rem; box-sizing:border-box; opacity:0; transition:opacity 340ms ease; }
    .cta-lbl.on{ opacity:1; }
    .cta-lbl-a{ font-family:'Fraunces',Georgia,serif; font-weight:400; font-size:clamp(1.12rem,4.6vw,1.4rem); line-height:1.3; }
    .cta-lbl-b{ font-weight:500; font-size:1.08rem; }
    .cta-back{ position:fixed; left:0; right:0; bottom:calc(.15rem + env(safe-area-inset-bottom)); text-align:center; z-index:4; }
    /* Standalone PWA: the fixed containing block already sits above the home-indicator inset, so
       adding env() again double-counts and floats the buttons ~34px too high. Drop it here → sits low. */
    @media (display-mode: standalone){
      .cta{ bottom:2.6rem; }
      .cta-back{ bottom:.15rem; }
      .done-actions{ bottom:.6rem; }
    }
    .mr-ghost{ appearance:none; border:none; background:none; cursor:pointer; font-family:inherit; font-size:.95rem;
      color:var(--ghost); padding:.5rem .9rem; border-radius:999px; transition:color 160ms ease; }
    .mr-ghost:hover{ color:var(--txt); }
    .mr-btn:focus-visible, .mr-ghost:focus-visible, .mr-theme:focus-visible{ outline:2px solid var(--accent); outline-offset:3px; }

    /* review-step deeplink button */
    .mr-stepwrap{ display:flex; flex-direction:column; align-items:center; }
    .mr-link{ display:inline-block; margin-top:1.4rem; font-size:.94rem; color:var(--accent); border:1.5px solid var(--accent);
      padding:.55rem 1.15rem; border-radius:999px; text-decoration:none; transition:background 160ms ease, color 160ms ease;
      animation:mr-rise 700ms cubic-bezier(.22,1,.36,1) 140ms both; }
    .mr-link:hover{ background:var(--accent); color:var(--btnTxt); }

    /* single-duration step timer (meditate / walk) */
    .step-timer{ display:flex; flex-direction:column; align-items:center; gap:1rem; margin-top:1.8rem;
      animation:mr-rise 700ms cubic-bezier(.22,1,.36,1) 120ms both; }
    .step-time-row{ display:flex; align-items:center; justify-content:center; gap:.6rem; }
    .step-time{ font-family:'Fraunces',Georgia,serif; font-size:clamp(2.8rem,13vw,3.8rem); font-variant-numeric:tabular-nums;
      color:var(--txt); line-height:1; }
    .step-time.ring{ animation:mob-pulse 1s ease-in-out infinite; }
    .step-time-btn{ appearance:none; border:none; background:none; padding:0; cursor:default; }
    .step-time-btn.tappable{ cursor:pointer; border-bottom:2px dotted var(--track); }
    .step-time-input{ appearance:none; background:none; border:none; border-bottom:2px solid var(--accent); padding:0;
      width:5.2ch; text-align:center; color:var(--txt); outline:none; }
    /* duration chevrons — fade away once the timer is running */
    .med-chev{ appearance:none; border:none; background:none; cursor:pointer; color:var(--accent); font-size:2.2rem; line-height:1;
      padding:.2rem .5rem; border-radius:999px; transition:opacity 300ms ease, color 140ms ease; }
    .med-chev:disabled{ color:var(--track); cursor:default; }
    .med-chev.gone{ opacity:0; pointer-events:none; }
    .med-hint{ font-size:.82rem; color:var(--sub); margin-top:-.35rem; }
    .step-timer-btns{ display:flex; align-items:center; gap:.6rem; }
    .step-go{ min-width:9rem; font-size:1rem; padding:.8rem 2rem; }
    .step-go.stop{ animation:mob-pulse 1s ease-in-out infinite; }

    /* ── Panel (mobility / psychohabitual) ── */
    .mob-wrap{ display:flex; flex-direction:column; min-height:0; flex:1 1 auto; width:100%; }
    .mob-head{ font-family:'Fraunces',Georgia,serif; font-weight:400; font-size:clamp(1.35rem,5vw,1.8rem);
      letter-spacing:-.01em; margin:0 auto; color:var(--txt); text-align:center;
      display:inline-block; align-self:center; max-width:90%; white-space:normal; transform-origin:center center;
      animation:mob-title-fly 560ms cubic-bezier(.5,0,.15,1) both; }
    /* delayed so the content only fades in AFTER the title has risen clear of the center */
    .mob-body{ display:flex; flex-direction:column; min-height:0; flex:1 1 auto; animation:mr-rise 620ms cubic-bezier(.22,1,.36,1) 470ms both; }
    .mob-controls{ display:flex; align-items:center; justify-content:space-between; gap:.6rem; margin:.4rem 0 .1rem; }
    .mob-prog{ font-size:.8rem; color:var(--sub); font-variant-numeric:tabular-nums; }
    /* the panel main reserves the button zone, so this only needs a gentle edge fade. */
    .mob-scroll{ flex:1 1 auto; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; margin-top:.2rem; padding-bottom:1.2rem; scrollbar-width:none;
      -webkit-mask-image:linear-gradient(180deg,transparent,#000 .7rem,#000 calc(100% - .7rem),transparent);
              mask-image:linear-gradient(180deg,transparent,#000 .7rem,#000 calc(100% - .7rem),transparent); }
    .mob-scroll::-webkit-scrollbar{ display:none; }
    .mob-section{ font-family:'Fraunces',Georgia,serif; font-size:.95rem; font-weight:500; color:var(--sub); margin:.85rem 0 .1rem; letter-spacing:.01em; }
    .mob-item{ padding:.55rem 0; border-bottom:1px solid var(--rowBorder); }
    .mob-line{ display:flex; align-items:center; gap:.7rem; }
    .mob-sides{ display:flex; gap:.45rem; flex:0 0 auto; }
    .mob-check{ flex:0 0 auto; width:1.95rem; height:1.95rem; border-radius:9px; border:1.5px solid var(--rowBorder);
      background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--btnTxt);
      font-size:1.05rem; transition:background 140ms ease, border-color 140ms ease; }
    .mob-check.on{ background:var(--accent); border-color:var(--accent); }
    .mob-check.sq{ font-size:.85rem; font-weight:600; color:var(--sub); }
    .mob-check.sq.on{ color:var(--btnTxt); }
    .mob-label{ flex:1 1 auto; font-size:1rem; color:var(--txt); text-align:left; line-height:1.3; background:none; border:none; padding:0; font-family:inherit; cursor:pointer; }
    .mob-label.on{ color:var(--sub); text-decoration:line-through; }
    .mob-timer{ display:flex; align-items:center; gap:.4rem; margin:.55rem 0 .05rem 2.65rem; flex-wrap:wrap; }
    .mob-chip{ appearance:none; border:none; cursor:pointer; font:inherit; font-size:.82rem; font-variant-numeric:tabular-nums;
      padding:.4rem .7rem; border-radius:999px; background:var(--chipBg); color:var(--chipTxt); min-width:3.6rem; text-align:center;
      transition:background 140ms ease, color 140ms ease; }
    .mob-chip.run{ background:var(--accent); color:var(--btnTxt); }
    .mob-chip.stop{ background:var(--accent); color:var(--btnTxt); animation:mob-pulse 1s ease-in-out infinite; }
    .mob-reset{ appearance:none; border:none; background:none; cursor:pointer; color:var(--sub); font-size:1.15rem; line-height:1; padding:.2rem .35rem; border-radius:6px; transition:color 140ms ease; }
    .mob-reset:hover{ color:var(--txt); }

    /* psychohabitual nested list */
    .ph-list{ margin:0; padding-left:1.15rem; }
    .ph-list.ph-d0{ list-style:none; padding-left:0; }
    .ph-li{ font-size:.95rem; line-height:1.45; color:var(--txt); margin:.32rem 0; }
    .ph-d0 > .ph-head{ font-family:'Fraunces',Georgia,serif; font-weight:500; font-size:1.08rem; margin:1rem 0 .3rem; }

    /* ── Done-screen outdoors scene (full-screen) ── */
    .done-restart{ min-width:auto; padding:.9rem 2.4rem; }

    // Audio: create/resume the context on a user gesture (unlock), then chime later.
    function useAudio() {
      const ctxRef = useRef(null);
      const ensure = useCallback(() => {
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return null;
          if (!ctxRef.current) ctxRef.current = new AC();
          if (ctxRef.current.state === "suspended") ctxRef.current.resume();
          return ctxRef.current;
        } catch (e) { return null; }
      }, []);
      const unlock = useCallback(() => {
        const ctx = ensure();
        if (!ctx) return;
        try { // near-silent blip fully unlocks iOS audio
          const o = ctx.createOscillator(), g = ctx.createGain();
          g.gain.value = 0.0001; o.connect(g); g.connect(ctx.destination);
          o.start(); o.stop(ctx.currentTime + 0.03);
        } catch (e) {}
      }, [ensure]);
      const chime = useCallback(() => {
        const ctx = ensure();
        if (ctx) {
          try {
            const t = ctx.currentTime;
            const master = ctx.createGain();
            master.gain.setValueAtTime(0.0001, t);
            master.gain.exponentialRampToValueAtTime(0.85, t + 0.02); // louder
            master.gain.exponentialRampToValueAtTime(0.0001, t + 0.62);
            master.connect(ctx.destination);
            // two notes, richer triangle tone + an octave-down reinforcement
            [{ f: 880, at: 0 }, { f: 1174.66, at: 0.14 }].forEach(({ f, at }) => {
              const o = ctx.createOscillator(), sub = ctx.createOscillator();
              o.type = "triangle"; sub.type = "sine";
              o.frequency.setValueAtTime(f, t + at);
              sub.frequency.setValueAtTime(f / 2, t + at);
              o.connect(master); sub.connect(master);
              o.start(t + at); sub.start(t + at);
              o.stop(t + 0.62); sub.stop(t + 0.62);
            });
          } catch (e) {}
        }
        try { if (navigator.vibrate) navigator.vibrate([130, 60, 130]); } catch (e) {}
      }, [ensure]);
      return { unlock, chime };
    }

    function useWakeLock() {
      useEffect(() => {
        let lock = null;
        const request = async () => {
          try {
            if (!("wakeLock" in navigator)) return;
            if (lock && !lock.released) return;
            lock = await navigator.wakeLock.request("screen");
          } catch (e) {}
        };
        request();
        const onVis = () => { if (document.visibilityState === "visible") request(); };
        document.addEventListener("visibilitychange", onVis);
        window.addEventListener("pointerdown", request);
        return () => {
          document.removeEventListener("visibilitychange", onVis);
          window.removeEventListener("pointerdown", request);
          try { if (lock && !lock.released) lock.release(); } catch (e) {}
        };
      }, []);
    }

    // Timer with an optional duration picker: chevrons cycle presets (and an extra "custom" slot),
    // and fade out once the timer is running.
    function StepTimer({ presets = [5], custom = false }) {
      const [sel, setSel] = useState(() => { const i = presets.indexOf(5); return i >= 0 ? i : 0; });
      const [customSec, setCustomSec] = useState(null);  // non-null → a tapped-in custom time overrides the preset
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState("");
      const seconds = customSec != null ? customSec : Math.max(1, presets[sel]) * 60;
      const [remaining, setRemaining] = useState(seconds);
      const [running, setRunning] = useState(false);
      const [alarming, setAlarming] = useState(false);
      const { unlock, chime } = useAudio();

      // while idle, keep the countdown synced to the chosen duration
      useEffect(() => { if (!running && !alarming) setRemaining(seconds); }, [seconds, running, alarming]);
      useEffect(() => {
        if (!running) return;
        const id = setInterval(() => setRemaining((r) => Math.max(0, r - 1)), 1000);
        return () => clearInterval(id);
      }, [running]);
      useEffect(() => { if (running && remaining === 0) { setRunning(false); setAlarming(true); } }, [running, remaining]);
      useEffect(() => {
        if (!alarming) return;
        chime(); let n = 0;
        const id = setInterval(() => { n += 1; if (n > 40) { clearInterval(id); setAlarming(false); return; } chime(); }, 1500);
        return () => clearInterval(id);
      }, [alarming, chime]);

      const idle = !running && !alarming && remaining === seconds;
      const selectable = presets.length > 1;
      const isCustom = customSec != null;
      const primary = () => {
        unlock();
        if (alarming) { setAlarming(false); setRemaining(seconds); return; }
        if (remaining === 0) setRemaining(seconds);
        setRunning((r) => !r);
      };
      const reset = () => { setAlarming(false); setRunning(false); setRemaining(seconds); };
      const label = alarming ? "⏹ Stop" : running ? "Pause" : remaining < seconds ? "Resume" : "Start";
      // a chevron tap in custom mode drops back to the presets; otherwise it moves between presets
      const chev = (delta) => {
        if (isCustom) { setCustomSec(null); return; }
        setSel((s) => Math.max(0, Math.min(presets.length - 1, s + delta)));
      };
      const startEdit = () => { if (custom && idle) { setDraft(String(Math.max(1, Math.round(seconds / 60)))); setEditing(true); } };
      const commitDraft = () => {
        // numeric keypad has no colon: "20" → 20 min, "2030" → 20:30, and "mm:ss" if pasted
        const s = draft.trim(); let sec = null, m;
        if ((m = s.match(/^(\d{1,3}):([0-5]?\d)$/))) sec = (+m[1]) * 60 + (+m[2]);
        else if (/^\d+$/.test(s)) sec = s.length <= 2 ? (+s) * 60 : (+s.slice(0, -2)) * 60 + Math.min(59, +s.slice(-2));
        if (sec != null && sec > 0) setCustomSec(Math.min(sec, 180 * 60));
        setEditing(false);
      };

      return (
        <div className="step-timer">
          <div className="step-time-row">
            {selectable && (
              <button className={"med-chev" + (idle ? "" : " gone")} onClick={() => chev(-1)}
                disabled={!idle || (!isCustom && sel === 0)} aria-label="shorter">‹</button>
            )}
            {editing ? (
              <input className="step-time step-time-input" autoFocus inputMode="numeric" size={5} value={draft}
                onChange={(e) => setDraft(e.target.value)} onBlur={commitDraft}
                onKeyDown={(e) => { if (e.key === "Enter") e.target.blur(); }} aria-label="custom time (mm:ss)" />
            ) : (
              <button className={"step-time step-time-btn" + (custom && idle ? " tappable" : "") + (alarming ? " ring" : "")}
                onClick={startEdit}>{fmt(remaining)}</button>
            )}
            {selectable && (
              <button className={"med-chev" + (idle ? "" : " gone")} onClick={() => chev(1)}
                disabled={!idle || (!isCustom && sel === presets.length - 1)} aria-label="longer">›</button>
            )}
          </div>
          {custom && idle && <div className="med-hint">{isCustom ? "custom · tap the time to change it" : "tap the time to set a custom length"}</div>}
          <div className="step-timer-btns">
            <button className={"mr-btn step-go" + (alarming ? " stop" : "")} onClick={primary}>{label}</button>
            {!alarming && (running || remaining < seconds) && <button className="mob-reset" onClick={reset} aria-label="Reset timer">↺</button>}
          </div>
        </div>
      );
    }

    function MobilityChecklist({ sections = MOBILITY, title = "Mobility training", footer = null }) {
      const total = sectionsTotal(sections);
      const [done, setDone] = useState(() => new Set());
      const [active, setActive] = useState(null); // { key, dur }
      const [running, setRunning] = useState(false);
      const [remaining, setRemaining] = useState(0);
      const [alarming, setAlarming] = useState(null);
      const { unlock, chime } = useAudio();

      useEffect(() => {
        if (!running || !active) return;
        const id = setInterval(() => setRemaining((r) => Math.max(0, r - 1)), 1000);
        return () => clearInterval(id);
      }, [running, active]);
      useEffect(() => {
        if (running && active && remaining === 0) { setAlarming({ key: active.key, dur: active.dur }); setRunning(false); setActive(null); }
      }, [remaining, running, active]);
      useEffect(() => {
        if (!alarming) return;
        chime(); let n = 0;
        const id = setInterval(() => { n += 1; if (n > 40) { clearInterval(id); setAlarming(null); return; } chime(); }, 1500);
        return () => clearInterval(id);
      }, [alarming, chime]);

      const onDur = useCallback((key, dur) => {
        unlock();
        setAlarming((a) => (a && a.key === key ? null : a));
        setActive((cur) => {
          if (cur && cur.key === key && cur.dur === dur) { setRunning((r) => !r); return cur; }
          setRemaining(dur); setRunning(true); return { key, dur };
        });
      }, [unlock]);
      const onReset = useCallback((key) => {
        setAlarming((a) => (a && a.key === key ? null : a));
        setActive((cur) => { if (cur && cur.key === key) { setRunning(false); setRemaining(0); return null; } return cur; });
      }, []);
      // Stop the ring AND auto-check the next side (right → left).
      const onStop = useCallback((key, sides) => {
        setAlarming((a) => (a && a.key === key ? null : a));
        setDone((d) => {
          const n = new Set(d);
          if (sides) { const R = key + "::R", L = key + "::L"; if (!n.has(R)) n.add(R); else n.add(L); }
          else n.add(key + "::x");
          return n;
        });
      }, []);
      const toggleDone = useCallback((k) => {
        setDone((d) => { const n = new Set(d); n.has(k) ? n.delete(k) : n.add(k); return n; });
      }, []);
      const resetAll = useCallback(() => {
        setDone(new Set()); setActive(null); setRunning(false); setRemaining(0); setAlarming(null);
      }, []);

      const renderCheck = (ck, label) => {
        const on = done.has(ck);
        return (
          <button key={ck} className={"mob-check" + (label ? " sq" : "") + (on ? " on" : "")}
            onClick={() => toggleDone(ck)} aria-label={label ? `${label} side` : "toggle done"}>
            {on ? "✓" : (label || "")}
          </button>
        );
      };

      return (
        <div className="mob-wrap">
          <p className="mob-head">{title}</p>
          <div className="mob-body">
            <div className="mob-controls">
              <span className="mob-prog">{done.size === total ? "all done ✓" : `${done.size} / ${total} done`}</span>
              <button className="mr-ghost" style={{ padding: ".2rem .5rem", fontSize: ".8rem" }} onClick={resetAll}>reset all</button>
            </div>
            <div className="mob-scroll">
              {sections.map((sec) => (
                <div key={sec.section}>
                  <div className="mob-section">{sec.section}</div>
                  {sec.items.map((it) => {
                    const name = itemName(it), sides = itemSides(it);
                    const key = sec.section + "::" + name;
                    const isActive = active && active.key === key;
                    const isAlarming = alarming && alarming.key === key;
                    return (
                      <div className="mob-item" key={key}>
                        <div className="mob-line">
                          {sides ? (
                            <div className="mob-sides">{renderCheck(key + "::L", "L")}{renderCheck(key + "::R", "R")}</div>
                          ) : renderCheck(key + "::x", "")}
                          <button className={"mob-label" + (
                            sides ? (done.has(key + "::L") && done.has(key + "::R") ? " on" : "")
                                  : (done.has(key + "::x") ? " on" : "")
                          )} onClick={() => toggleDone(sides ? key + "::R" : key + "::x")}>{name}</button>
                        </div>
                        {sec.timed && (
                          <div className="mob-timer">
                            {HOLDS.map((dur) => {
                              const onThis = isActive && active.dur === dur;
                              const thisAlarming = isAlarming && alarming.dur === dur;
                              // play/pause icon always on the LEFT so it never jumps sides;
                              // the running chip itself becomes ⏹ Stop when the timer ends.
                              const label = thisAlarming ? "⏹ Stop"
                                : onThis ? `${running ? "⏸" : "▶"} ${fmt(remaining)}`
                                : `▶ ${dur}s`;
                              return (
                                <button key={dur} className={"mob-chip" + (thisAlarming ? " stop" : (onThis && running ? " run" : ""))}
                                  onClick={() => (thisAlarming ? onStop(key, sides) : onDur(key, dur))} aria-label={`${dur} second hold`}>
                                  {label}
                                </button>
                              );
                            })}
                            {isActive && <button className="mob-reset" onClick={() => onReset(key)} aria-label="Reset timer">↺</button>}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
            {footer}
          </div>
        </div>
      );
    }

    function Routine() {
      useWakeLock();

      const [launching, setLaunching] = useState(false);

      const isDone = pos === N + 1;
      const isStep = !isIntro && !isDone;
      const stepIdx = pos - 1;

      useEffect(() => {
        try {
          const saved = localStorage.getItem(MODE_KEY);
          if (saved === "morning" || saved === "night") setMode(saved);
          // default to morning (light); intentionally do NOT follow the OS dark-mode preference
        } catch (e) {}
      }, []);
      useEffect(() => {
        const cap = STEPS_BY_MODE[mode].length + 1;
        let p = 0, t = {};
        try {
          const raw = localStorage.getItem(progKey(mode));
          if (raw) { const s = JSON.parse(raw); if (s.day === routineDay() && typeof s.pos === "number") { p = Math.max(0, Math.min(cap, s.pos)); t = s.times || {}; } }
        } catch (e) {}
        setPos(p); setTimes(t); setLoaded(true);
      }, [mode]);

      const save = useCallback((p, t) => {
        try { localStorage.setItem(progKey(mode), JSON.stringify({ day: routineDay(), pos: p, times: t })); } catch (e) {}
      }, [mode]);

      const go = useCallback((next) => {
        const cap = STEPS_BY_MODE[mode].length + 1;
        const clamped = Math.max(0, Math.min(cap, next));
        setPos(clamped);
        setTimes((t) => { save(clamped, t); return t; });
      }, [mode, save]);

      const begin = useCallback(() => {
        setLaunching(true);       // fade the intro line out while the button morphs
        go(1);
        setTimeout(() => setLaunching(false), 340);
      }, [go]);

      const toggleMode = useCallback(() => {
        setMode((m) => { const next = m === "night" ? "morning" : "night"; try { localStorage.setItem(MODE_KEY, next); } catch (e) {} return next; });
      }, []);

      // Stopwatch: accumulate active (foreground) time on the current step, once per second.
      useEffect(() => {
        if (!isStep) return;
        const id = setInterval(() => {
          if (document.visibilityState !== "visible") return;
          setTimes((t) => { const nt = { ...t, [stepIdx]: (t[stepIdx] || 0) + 1 }; save(pos, nt); return nt; });
        }, 1000);
        return () => clearInterval(id);
      }, [isStep, stepIdx, pos, save]);

      // Programmatic clearance: reserve exactly enough space so a panel's scroll ends ~14px above the
      // Done button. Uses the live button's resting bottom + height (transform-independent) minus the
      // frame's own bottom padding (which main already sits inside), so it isn't double-counted.
      useEffect(() => {
        if (!isStep) return;
        const measure = () => {
          const el = ctaRef.current, frame = document.querySelector(".mr-frame");
          if (!el || !frame) return;
          const bottom = parseFloat(getComputedStyle(el).bottom) || 0;
          const framePad = parseFloat(getComputedStyle(frame).paddingBottom) || 0;
          const clear = Math.max(16, bottom + el.offsetHeight + 14 - framePad);
          document.documentElement.style.setProperty("--panel-clear", clear + "px");
        };
        const raf = requestAnimationFrame(measure);
        window.addEventListener("resize", measure);
        return () => { cancelAnimationFrame(raf); window.removeEventListener("resize", measure); };
      }, [isStep, pos, mode]);

      const g = GRADIENTS[theme];
      const frac = Math.min(1, Math.max(0, pos / (N + 1)));
      const topColor = lerpHex(g.COOL_TOP, g.WARM_TOP, frac);
      const bottomColor = lerpHex(g.COOL_BOT, g.WARM_BOT, frac);
      const rootStyle = { background: `linear-gradient(180deg, ${topColor} 0%, ${bottomColor} 100%)` };

      // Status-bar/chrome TINT (theme-color): sky at top of the done scene, gradient bottom elsewhere.
      const barColor = isDone ? topColor : bottomColor;
      // BODY background fills any area the fixed content doesn't cover — notably the standalone PWA's
      // bottom home-indicator strip. On the done screen that edge is hills, so fill it with the front hill.
      const HILL3 = { light: "#2C5A50", dark: "#1B322D" };
      const bodyBg = isDone ? HILL3[theme] : bottomColor;
      useEffect(() => {
        try {
          document.body.style.background = bodyBg;
          const m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute("content", barColor);
        } catch (e) {}
      }, [bodyBg, barColor]);

      const totalSec = Object.keys(times).reduce((a, k) => a + (times[k] || 0), 0);

      if (!loaded) return <div className="mr-root" data-theme={theme} style={rootStyle}><style>{CSS}</style></div>;
      const stepText = isStep ? steps[stepIdx] : "";
      const isPsycho = isStep && stepText === PSYCHO_STEP;
      const isMobility = isStep && stepText.toLowerCase().includes("mobility training");
      const isWalk = isStep && stepText.toLowerCase().includes("joint rollout");
      const isMeditate = isStep && stepText.toLowerCase().includes("meditate");
      const isPanel = isPsycho || isMobility || isWalk;
      const link = isStep ? stepLink(stepText) : null;

      return (
        <div className="mr-root" data-theme={theme} style={rootStyle}>
          <style>{CSS}</style>
          {isDone && <Scene theme={theme} />}
          <div className="mr-frame">
            {isIntro && (
              <button className="mr-theme" onClick={toggleMode} aria-label="Switch between morning and night routine">
                {mode === "night" ? "☀" : "☾"}
              </button>
            )}

            <header className="mr-top">
              {isStep && (
                <>
                  <div className="mr-eyebrow-row">
                    <span className="mr-eyebrow">{MODE_META[mode].label} · step {pos} of {N}</span>
                    <span className="mr-watch" aria-label="time elapsed since starting">{fmt(totalSec)}</span>
                  </div>
                  <div className="mr-track"><div className="mr-fill" style={{ width: `${(pos / N) * 100}%` }} /></div>
                </>
              )}
            </header>

            {(isIntro || launching) && INTRO_LINE[mode] && (
              <p className={"mr-intro-line" + (launching ? " out" : "")} key={mode}>{INTRO_LINE[mode]}</p>
            )}

            <main className={"mr-main" + (isPanel ? " panel" : "")}>
              {isPsycho && <PsychoReview key={mode + pos} />}
              {isMobility && <MobilityChecklist key={mode + pos} sections={MOBILITY} title="Mobility training" />}
              {isWalk && <MobilityChecklist key={mode + pos} sections={ROLLOUT_CIRCUIT} title="Walk and joint rollout"
                footer={<StepTimer presets={[5]} />} />}
              {isStep && !isPanel && (
                <div className="mr-stepwrap" key={mode + pos}>
                  <p className="mr-step">{stepText}</p>
                  {isMeditate && <StepTimer presets={[1, 5, 10]} custom={true} />}
                  {link && <a className="mr-link" href={link.href}>{link.label}</a>}
                </div>
              )}
            </main>

            {/* one element that MORPHS: the box reshapes/repositions while the two labels crossfade */}
            {!isDone && (
              <button
                ref={ctaRef}
                className={"cta " + (isIntro ? "cta-intro enter" : "cta-step")}
                onClick={isIntro ? begin : () => go(pos + 1)}
              >
                <span className={"cta-lbl cta-lbl-a" + (isIntro ? " on" : "")}>{MANTRA[mode]}</span>
                <span className={"cta-lbl cta-lbl-b" + (isIntro ? "" : " on")}>Done</span>
              </button>
            )}
            {isStep && (
              <div className="cta-back"><button className="mr-ghost" onClick={() => go(pos - 1)}>‹ Back</button></div>
            )}

            {isDone && (
              <>
                <div className="done-summary">
                  <div className="done-total">{fmt(totalSec)}</div>
                  <div className="done-total-cap">total time</div>
                  <ul className="done-breakdown">
                    {steps.map((s, i) => (
                      <li key={i}><span className="db-name">{s}</span><span className="db-time">{fmt(times[i] || 0)}</span></li>
                    ))}
                  </ul>
                </div>
                <div className="done-actions">
                  <button className="mr-btn done-restart" onClick={() => go(0)}>Start over</button>
                  <button className="mr-ghost done-back" onClick={() => go(N)}>‹ Back</button>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Routine />);
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(() => {}); });
    }
  </script>
</body>
</html>
